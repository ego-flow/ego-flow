name: Deploy To EC2

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: egoflow-prod-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ego-flow-backend
  DASHBOARD_IMAGE: ghcr.io/${{ github.repository_owner }}/ego-flow-dashboard
  DEPLOY_PATH: /opt/egoflow/repo
  CONFIG_PATH: /opt/egoflow/config
  RELEASES_PATH: /opt/egoflow/releases

jobs:
  build-images:
    runs-on: ubuntu-latest
    outputs:
      deploy_image_tag: ${{ steps.image-tag.outputs.deploy_image_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve Image Tag
        id: image-tag
        run: |
          echo "deploy_image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build And Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./ego-flow-server/backend
          file: ./ego-flow-server/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:main
            ${{ env.BACKEND_IMAGE }}:${{ steps.image-tag.outputs.deploy_image_tag }}

      - name: Build And Push Dashboard Image
        uses: docker/build-push-action@v6
        with:
          context: ./ego-flow-server/frontend
          file: ./ego-flow-server/frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:main
            ${{ env.DASHBOARD_IMAGE }}:${{ steps.image-tag.outputs.deploy_image_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-images

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Render Production Env File
        run: |
          cat > deploy/ec2/.env <<EOF
          DATABASE_URL=postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/egoflow?schema=public
          REDIS_URL=redis://redis:6379
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ADMIN_DEFAULT_PASSWORD=${{ secrets.ADMIN_DEFAULT_PASSWORD }}
          PUBLIC_RTMP_BASE_URL=${{ vars.PUBLIC_RTMP_BASE_URL }}
          PUBLIC_HLS_BASE_URL=${{ vars.PUBLIC_HLS_BASE_URL }}
          MEDIAMTX_API_URL=http://mediamtx:${{ vars.MEDIAMTX_API_PORT || '9997' }}
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          EOF

      - name: Render Production Config File
        run: |
          cat > deploy/ec2/config.json <<EOF
          {
            "TARGET_DIRECTORY": "/data/datasets",
            "PUBLIC_HTTP_PORT": ${{ vars.PUBLIC_HTTP_PORT || '80' }},
            "RTMP_PORT": ${{ vars.RTMP_PORT || '1935' }},
            "HLS_PORT": ${{ vars.HLS_PORT || '8888' }},
            "MEDIAMTX_API_PORT": ${{ vars.MEDIAMTX_API_PORT || '9997' }},
            "CORS_ORIGIN": "${{ vars.CORS_ORIGIN || '*' }}",
            "WORKER_CONCURRENCY": ${{ vars.WORKER_CONCURRENCY || '2' }},
            "DELETE_RAW_AFTER_PROCESSING": ${{ vars.DELETE_RAW_AFTER_PROCESSING || 'true' }},
            "JWT_EXPIRES_IN": "24h",
            "JWT_REFRESH_THRESHOLD_SECONDS": 21600
          }
          EOF

      - name: Render Production Compose Env File
        run: |
          cat > deploy/ec2/.env.compose <<EOF
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=egoflow
          BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ needs.build-images.outputs.deploy_image_tag }}
          DASHBOARD_IMAGE=${{ env.DASHBOARD_IMAGE }}:${{ needs.build-images.outputs.deploy_image_tag }}
          DATA_ROOT=/opt/egoflow/data
          CONFIG_ROOT=${{ env.CONFIG_PATH }}
          RELEASES_ROOT=${{ env.RELEASES_PATH }}
          EOF

      - name: Update Repository On EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh "${EC2_USER}@${EC2_HOST}" "
            set -euo pipefail
            cd '${DEPLOY_PATH}'
            git fetch --depth=1 origin main
            git checkout --detach '${GITHUB_SHA}'
            mkdir -p '${CONFIG_PATH}'
            mkdir -p '${RELEASES_PATH}'
          "

      - name: Upload Production Env File
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp deploy/ec2/.env "${EC2_USER}@${EC2_HOST}:${CONFIG_PATH}/.env"

      - name: Upload Production Config File
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp deploy/ec2/config.json "${EC2_USER}@${EC2_HOST}:${CONFIG_PATH}/config.json"

      - name: Upload Production Compose Env File
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp deploy/ec2/.env.compose "${EC2_USER}@${EC2_HOST}:${CONFIG_PATH}/.env.compose"

      - name: Deploy On EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          ssh "${EC2_USER}@${EC2_HOST}" "
            set -euo pipefail
            cd '${DEPLOY_PATH}'
            chmod +x deploy/ec2/deploy.sh
            CONFIG_ROOT='${CONFIG_PATH}' RELEASES_ROOT='${RELEASES_PATH}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_READ_TOKEN}' deploy/ec2/deploy.sh deploy
          "

      - name: Smoke Test On EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh "${EC2_USER}@${EC2_HOST}" "
            set -euo pipefail
            cd '${DEPLOY_PATH}'
            CONFIG_ROOT='${CONFIG_PATH}' RELEASES_ROOT='${RELEASES_PATH}' deploy/ec2/deploy.sh smoke-test
          "
