name: Deploy To EC2

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: egoflow-prod-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ego-flow-backend
  DASHBOARD_IMAGE: ghcr.io/${{ github.repository_owner }}/ego-flow-dashboard
  DEPLOY_PATH: /opt/egoflow/repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build And Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./ego-flow-server/backend
          file: ./ego-flow-server/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:main
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build And Push Dashboard Image
        uses: docker/build-push-action@v6
        with:
          context: ./ego-flow-server/frontend
          file: ./ego-flow-server/frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_BACKEND_ORIGIN=${{ vars.VITE_BACKEND_ORIGIN }}
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:main
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Render Production Env File
        run: |
          cat > deploy/ec2/.env.prod <<EOF
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=egoflow
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ADMIN_DEFAULT_PASSWORD=${{ secrets.ADMIN_DEFAULT_PASSWORD }}
          CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
          PUBLIC_RTMP_BASE_URL=${{ vars.PUBLIC_RTMP_BASE_URL }}
          PUBLIC_HLS_BASE_URL=${{ vars.PUBLIC_HLS_BASE_URL }}
          WORKER_CONCURRENCY=${{ vars.WORKER_CONCURRENCY || '2' }}
          DELETE_RAW_AFTER_PROCESSING=${{ vars.DELETE_RAW_AFTER_PROCESSING || 'true' }}
          BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:main
          DASHBOARD_IMAGE=${{ env.DASHBOARD_IMAGE }}:main
          DATA_ROOT=/opt/egoflow/data
          EOF

      - name: Update Repository On EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh "${EC2_USER}@${EC2_HOST}" "
            set -euo pipefail
            cd '${DEPLOY_PATH}'
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            mkdir -p deploy/ec2
          "

      - name: Upload Production Env File
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp deploy/ec2/.env.prod "${EC2_USER}@${EC2_HOST}:${DEPLOY_PATH}/deploy/ec2/.env.prod"

      - name: Deploy On EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          ssh "${EC2_USER}@${EC2_HOST}" "
            set -euo pipefail
            cd '${DEPLOY_PATH}'
            chmod +x deploy/ec2/deploy.sh
            GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_READ_TOKEN}' deploy/ec2/deploy.sh
          "
