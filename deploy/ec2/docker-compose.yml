services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${DATA_ROOT}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${DATA_ROOT}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: &backend_environment
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_THRESHOLD_SECONDS: 21600
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      TARGET_DIRECTORY: /data/datasets
      RTMP_BASE_URL: ${PUBLIC_RTMP_BASE_URL}
      HLS_BASE_URL: ${PUBLIC_HLS_BASE_URL}
      BULLMQ_QUEUE_NAME: video-processing
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY}
      DELETE_RAW_AFTER_PROCESSING: ${DELETE_RAW_AFTER_PROCESSING}
    command: >
      sh -c "npm run prisma:migrate:deploy &&
      npm run db:seed:prod &&
      npm run start"
    ports:
      - "3000:3000"
    volumes:
      - ${DATA_ROOT}/raw:/data/raw
      - ${DATA_ROOT}/datasets:/data/datasets
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/v1/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment: *backend_environment
    command: ["npm", "run", "worker:start"]
    volumes:
      - ${DATA_ROOT}/raw:/data/raw
      - ${DATA_ROOT}/datasets:/data/datasets

  dashboard:
    image: ${DASHBOARD_IMAGE}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8088
    ports:
      - "8088:8088"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8088/login', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "1935:1935"
      - "8888:8888"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ${DATA_ROOT}/raw:/data/raw
